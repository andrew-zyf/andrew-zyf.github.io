<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Zyf - Sr. FPGA System Architect</title>
    <style>
        :root {
            /* GitHub 风格暗黑主题色 */
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --bio-color: #8b949e;
            --button-bg: #21262d;
            --button-hover: #30363d;
            --button-border: rgba(240, 246, 252, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 650px;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--button-hover);
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--bio-color);
            margin-bottom: 30px;
        }

        .bio span {
            color: var(--text-color);
            font-weight: 500;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 10px 24px;
            background-color: var(--button-bg);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid var(--button-border);
            transition: all 0.2s ease-in-out;
        }

        .btn:hover {
            background-color: var(--button-hover);
            border-color: var(--bio-color);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://github.com/andrew-zyf.png" alt="Andrew Zyf" class="avatar">
        
        <h1>Andrew Zyf</h1>
        
        <p class="bio">
            <span>Sr. FPGA System Architect</span> <br>
            FPGA + SoC HW/SW Co-design · Exploring Multimodal AI on Edge
        </p>

        <div class="links">
            <a href="https://github.com/andrew-zyf" target="_blank" rel="noopener noreferrer" class="btn">
                <svg viewBox="0 0 16 16">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                GitHub
            </a>

            <a href="https://x.com/andrew_zyf" target="_blank" rel="noopener noreferrer" class="btn">
                <svg viewBox="0 0 24 24">
                    <path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"></path>
                </svg>
                X (Twitter)
            </a>
        </div>
    </div>

</body>
</html>
